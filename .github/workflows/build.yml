name: Build

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git make clang perl curl wget xz-utils zip unzip

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Download SDK
        run: |
          mkdir -p $HOME/theos/sdks
          cd $HOME/theos/sdks
          wget https://github.com/theos/sdks/releases/latest/download/iPhoneOS16.5.sdk.tar.xz
          tar -xf iPhoneOS16.5.sdk.tar.xz

      - name: Build
        run: |
          export THEOS=$HOME/theos
          make package

      - name: Find output
        run: |
          find . -name "*.deb" -o -name "*.dylib"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            packages/*.deb
            .theos/**/*.deb
            **/*.deb
