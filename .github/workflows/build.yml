name: Build Theos Tweak

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git make clang perl curl wget xz-utils zip unzip

      - name: Install Theos (official way)
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Download SDKs
        run: |
          mkdir -p $HOME/theos/sdks
          curl -L https://github.com/theos/sdks/archive/refs/heads/master.zip -o sdks.zip
          unzip sdks.zip
          mv sdks-master/*.sdk $HOME/theos/sdks/

      - name: Fix toolchain (IMPORTANT)
        run: |
          mkdir -p $HOME/theos/toolchain/linux/iphone
          echo "export PATH=$PATH:/usr/bin" >> $GITHUB_ENV

      - name: Build
        run: |
          export THEOS=$HOME/theos
          export PATH=$PATH:/usr/bin
          make clean || true
          make package

      - name: Find output
        run: find . -name "*.deb" -o -name "*.dylib"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: theos-build
          path: |
            packages/*.deb
            .theos/**/*.deb
            **/*.deb
            **/*.dylib
