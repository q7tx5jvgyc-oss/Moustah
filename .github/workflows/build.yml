name: Build

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang make perl git curl ldid

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Build package
        run: |
          export THEOS=$HOME/theos
          make package

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: MostashClicker
          path: packages/*.deb
