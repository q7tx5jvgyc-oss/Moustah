name: Build

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make perl clang git dpkg dpkg-dev ldid

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Build + Package
        run: |
          make clean || true
          make package FINALPACKAGE=1

      - name: Collect output files
        run: |
          mkdir -p output
          find . -name "*.deb" -exec cp {} output/ \; || true
          find . -name "*.dylib" -exec cp {} output/ \; || true
          echo "=== FILES GENERATED ==="
          ls -R output || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MostashClicker
          path: output/
