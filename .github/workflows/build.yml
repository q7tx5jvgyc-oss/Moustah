name: Build

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make perl clang ldid dpkg

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Build package
        run: |
          make clean || true
          make package

      - name: Debug output (IMPORTANT)
        run: |
          echo "===== FIND ALL FILES ====="
          find . -type f | sort
          echo "===== DEB FILES ====="
          find . -name "*.deb" || true
          echo "===== DYLIB FILES ====="
          find . -name "*.dylib" || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            **/*.deb
            **/*.dylib
