name: Build Tweak

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Theos dependencies
      run: |
        brew install make dpkg

    - name: Build project
      run: |
        make package

    - name: Upload build
      uses: actions/upload-artifact@v4
      with:
        name: dylib-build
        path: packages/*.deb
