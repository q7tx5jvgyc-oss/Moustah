name: Build Single dylib

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git make clang perl curl wget xz-utils zip unzip

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Download iOS SDK
        run: |
          mkdir -p $HOME/theos/sdks
          cd $HOME/theos/sdks
          wget https://github.com/theos/sdks/releases/latest/download/iPhoneOS16.5.sdk.tar.xz
          tar -xf iPhoneOS16.5.sdk.tar.xz

      - name: Build dylib
        run: |
          export THEOS=$HOME/theos
          make clean
          make

      - name: Locate dylib
        run: |
          echo "Searching dylib..."
          find . -name "*.dylib"

      - name: Export ONLY dylib
        run: |
          mkdir -p output

          DLIB=$(find . -name "*.dylib" | head -n 1)

          echo "Found: $DLIB"

          cp "$DLIB" output/MostashClicker.dylib

          ls -lah output

      - name: Upload ONLY dylib
        uses: actions/upload-artifact@v4
        with:
          name: MostashClicker-dylib
          path: output/MostashClicker.dylib
