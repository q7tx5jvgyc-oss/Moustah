name: Build

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build tweak
        uses: Randomblock1/theos-action@v1

      - name: Show files
        run: |
          find . -type f | sort

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: |
            packages/*.deb
            .theos/**/*.dylib
            .theos/**/*.deb
            **/*.deb
