name: Build

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build tweak
        uses: Randomblock1/theos-action@v1

      - name: Show build output
        run: |
          echo "=== ALL FILES ==="
          find . -type f | sort

          echo "=== THEOS OUTPUT ==="
          find .theos -type f 2>/dev/null || true

          echo "=== PACKAGES ==="
          find packages -type f 2>/dev/null || true

      - name: Collect outputs
        run: |
          mkdir -p output

          find . -name "*.deb" -exec cp {} output/ \; || true
          find . -name "*.dylib" -exec cp {} output/ \; || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: output/*
